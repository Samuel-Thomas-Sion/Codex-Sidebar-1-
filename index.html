<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Codex Atmosphere Engine</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at top,#18314f 0%,#0f2238 35%,#070d18 100%);
}

/* Canvas */
canvas {
    display: block;
    width: 100%;
    height: 100%;
}

/* Tactical Grid Overlay */
.codex-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;

    background:
        linear-gradient(rgba(77,163,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(77,163,255,0.025) 1px, transparent 1px);

    background-size: 42px 42px;

    opacity: 0.28;

    animation: gridMove 14s linear infinite;
}

@keyframes gridMove {
    from {
        transform: translateY(0px);
    }
    to {
        transform: translateY(42px);
    }
}
</style>
</head>

<body>

<canvas id="engine"></canvas>
<div class="codex-grid"></div>

<script>
const canvas = document.getElementById("engine");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

/* =========================================
   PARTICLES
========================================= */

const particles = [];
const particleCount = 140;

class Particle {

    constructor() {
        this.reset();
    }

    reset() {

        this.x = Math.random() * w;

        /* Spawn from bottom */
        this.y = h + Math.random() * h;

        this.size = Math.random() * 2.8 + 0.5;

        /* Upward movement */
        this.speedY = Math.random() * 1.7 + 0.4;

        /* Slight drift */
        this.speedX = (Math.random() - 0.5) * 0.4;

        this.opacity = Math.random() * 0.5 + 0.15;

        /* Sidebar palette */
        const roll = Math.random();

        if (roll > 0.96) {
            this.color = "255,140,0";
        } else if (roll > 0.6) {
            this.color = "140,200,255";
        } else {
            this.color = "77,163,255";
        }

        this.pulse = Math.random() * Math.PI * 2;
    }

    update() {

        this.y -= this.speedY;
        this.x += this.speedX;

        this.pulse += 0.03;

        /* Respawn */
        if (this.y < -20) {
            this.reset();
            this.y = h + 20;
        }
    }

    draw() {

        const glow = Math.sin(this.pulse) * 0.35 + 0.65;

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(${this.color}, ${this.opacity * glow})`;

        ctx.shadowColor =
            `rgba(${this.color}, 1)`;

        ctx.shadowBlur = 18;

        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

        ctx.fill();

        ctx.shadowBlur = 0;
    }
}

/* Generate particles */
for (let i = 0; i < particleCount; i++) {
    particles.push(new Particle());
}

/* =========================================
   SCAN LINE
========================================= */

let scanY = -80;

function drawScanline() {

    const gradient = ctx.createLinearGradient(
        0,
        scanY - 50,
        0,
        scanY + 50
    );

    gradient.addColorStop(0, "rgba(0,0,0,0)");
    gradient.addColorStop(0.5, "rgba(77,163,255,0.08)");
    gradient.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = gradient;

    ctx.fillRect(0, scanY - 50, w, 100);

    scanY += 1.4;

    if (scanY > h + 80) {
        scanY = -80;
    }
}

/* =========================================
   AMBIENT GLOW BURSTS
========================================= */

function drawAmbientGlow() {

    const glow = ctx.createRadialGradient(
        w / 2,
        h * 0.85,
        0,
        w / 2,
        h * 0.85,
        h * 0.7
    );

    glow.addColorStop(0, "rgba(77,163,255,0.08)");
    glow.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = glow;

    ctx.fillRect(0,0,w,h);
}

/* =========================================
   LOOP
========================================= */

function animate() {

    ctx.clearRect(0,0,w,h);

    drawAmbientGlow();

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    drawScanline();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
